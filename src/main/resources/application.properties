spring.application.name=EcommerceApplication

server.port=8080


spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION}

# Stripe
stripe.api.secret-key=${API_SECRET_KEY}

# DataLoader credentials
app.admin.username=${ADMIN_USERNAME:rohi}
app.admin.email=${ADMIN_EMAIL:rohi@gmail.com}
app.admin.password=${ADMIN_PASSWORD:rohi$555}
app.user.username=${USER_USERNAME:shruti}
app.user.email=${USER_EMAIL:shruti@gmail.com}
app.user.password=${USER_PASSWORD:shruti$333}